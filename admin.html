<!-- admin.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - ePLDT</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: #0a0a0a;
        color: #f5f5f5;
      }
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background-color: #1a1a1a;
      }
      nav .logo {
        font-weight: 800;
        font-size: 1.5rem;
        color: #c92a2a;
      }
      nav .navbar__links a {
        margin-left: 1rem;
        color: #f5f5f5;
        text-decoration: none;
      }
      h1 {
        text-align: center;
        margin-top: 2rem;
        color: #ff4444;
      }
      #adminContainer {
        width: 90%;
        max-width: 1000px;
        margin: 2rem auto;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .user-card {
        background-color: #1a1a1a;
        padding: 1rem;
        border: 1px solid #8b1a1a;
        border-radius: 8px;
      }
      .user-card h3 {
        margin: 0 0 0.5rem 0;
        color: #c92a2a;
      }
      .user-card ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .user-card li {
        padding: 0.5rem 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333;
      }
      .btn-cancel,
      .admin-cancel-btn {
        background-color: #c92a2a;
        color: #f5f5f5;
        border: none;
        padding: 0.3rem 0.6rem;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-cancel:hover,
      .admin-cancel-btn:hover {
        background-color: #ff4444;
      }
      .no-users {
        text-align: center;
        margin-top: 2rem;
        color: #888;
      }
      nav a {
        display: inline-block;
        margin-left: 1rem;
        padding: 0.5rem 1rem;
        background-color: #8b1a1a; /* deep red */
        color: #f5f5f5; /* light text */
        text-decoration: none;
        border-radius: 5px;
        font-weight: 600;
        transition: background-color 0.2s;
      }

      nav a:hover {
        background-color: #ff4444; /* lighter red on hover */
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">ePLDT Admin</div>
      <div>
        <a href="index.html">Home</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </nav>

    <h1 class="admin-title">Admin Dashboard</h1>

    <div id="adminContainer" class="admin-container"></div>

    <script src="script.js"></script>
  </body>
</html>
