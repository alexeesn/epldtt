<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/logo.png">
  <title>Subscriptions - ePLDT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; }
    .hero { text-align: center; padding: 2rem 1rem; }
    .hero__title { font-size: 2rem; color: #c92a2a; margin-bottom: 0.5rem; }
    .hero__subtitle { color: #f5f5f5; margin-bottom: 2rem; }
    .subscriptions-container { max-width: 900px; margin: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .subscription-card { background-color: #1a1a1a; border-left: 4px solid #c92a2a; padding: 1rem 1.5rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .subscription-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .subscription-plan { font-weight: 600; color: #ff4444; }
    .subscription-status { font-size: 0.9rem; color: #f5f5f5; }
    .btn-cancel { background-color: #8b1a1a; color: #f5f5f5; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn-cancel:hover { background-color: #ff4444; }
    .no-subscriptions { text-align: center; margin-top: 2rem; color: #888; }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html"><div class="navbar__logo">ePLDT</div></a>
    <ul class="navbar__links">
      <li><a href="index.html#features" class="navbar__link">Features</a></li>

      <li><a href="about.html" class="navbar__link">About</a></li>
      <li><a href="contact.html" class="navbar__link">Contact</a></li>
    </ul>
    <div id="navUser"></div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1 class="hero__title">Your Subscriptions</h1>
    <p class="hero__subtitle">View your active plans and manage them here.</p>
  </section>

  <!-- Subscriptions -->
  <section class="subscriptions-container" id="subscriptionsContainer"></section>

  <script src="script.js"></script>
</body>
</html>
